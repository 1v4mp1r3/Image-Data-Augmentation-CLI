extensions: [jpg, jpeg, png, webp]

output:
  samples_per_image: 2
  format: jpeg
  suffix: "_aug{index:03d}"
  preserve_tree: true
  overwrite: false
  jpeg_quality: 94

runtime:
  workers: null
  chunksize: 16

annotations:
  yolo:
    enabled: true
    labels_dir: labels
    output_labels_dir: labels_aug
    allow_missing: false
    min_visibility: 0.15
    min_area: 8
    clip: true
    filter_invalid_bboxes: true
  masks:
    enabled: true
    masks_dir: masks
    output_masks_dir: masks_aug
    mask_extension: png
    allow_missing: false

transforms:
  - name: Resize
    params:
      height: 512
      width: 512
      p: 1.0

  - name: HorizontalFlip
    params:
      p: 0.5

  - name: ElasticTransform
    params:
      alpha: 35
      sigma: 6
      border_mode: 2
      p: 0.25

  - name: RandomBrightnessContrast
    params:
      brightness_limit: [-0.12, 0.12]
      contrast_limit: [-0.12, 0.12]
      p: 0.4

  - name: GaussNoise
    params:
      std_range: [0.02, 0.08]
      p: 0.25
